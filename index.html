<style>
/* ============================ THEME ============================ */
:root{
  --bg:#0d1017; --bg-1:#121724; --bg-2:#172033; --bg-3:#1f2a40;
  --panel:#131a28; --panel-2:#182133;
  --border:#27324a; --border-2:#33405e;
  --text:#e8ecf4; --text-soft:#c3ccdc; --muted:#8d9bb5; --muted-2:#6b7997;
  --accent:#e7b54c;        /* Gold */
  --accent-soft:#3a3115;
  --teal:#54c7c0; --teal-soft:#123230;
  --violet:#9d8cff; --violet-soft:#221d40;
  --blue:#5fa8ff; --blue-soft:#10243d;
  --good:#5ed39a; --good-soft:#0f2f22;
  --bad:#f0726f; --bad-soft:#341417;
  --warn:#f2b65a;
  --shadow:0 10px 30px rgba(0,0,0,.45);
  --radius:14px; --radius-s:9px;
  --sans:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
  --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
  --sidebar-w:312px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; background:
     radial-gradient(1200px 600px at 80% -10%, #16203a 0%, transparent 55%),
     radial-gradient(900px 500px at -10% 10%, #15242a 0%, transparent 50%),
     var(--bg);
  color:var(--text); font-family:var(--sans); line-height:1.62;
  font-size:16.5px; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
a{color:var(--teal); text-decoration:none}
a:hover{text-decoration:underline}
h1,h2,h3,h4{font-family:var(--serif); line-height:1.2; color:#fff; font-weight:600}
::selection{background:var(--accent); color:#1a1405}

/* scrollbars */
*{scrollbar-width:thin; scrollbar-color:var(--border-2) transparent}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-thumb{background:var(--border-2); border-radius:8px}
*::-webkit-scrollbar-thumb:hover{background:#42527a}

/* ============================ TOP BAR ============================ */
#topbar{
  position:fixed; top:0; left:0; right:0; height:54px; z-index:60;
  display:flex; align-items:center; gap:12px; padding:0 16px;
  background:rgba(10,13,20,.82); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
#topbar .brand{font-family:var(--serif); font-weight:600; letter-spacing:.3px; font-size:1.05rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
#topbar .brand b{color:var(--accent)}
#topbar .spacer{flex:1}
#topProgWrap{display:flex; align-items:center; gap:9px; min-width:120px}
#topProgBar{flex:1; height:7px; min-width:70px; background:var(--bg-2); border-radius:6px; overflow:hidden; border:1px solid var(--border)}
#topProgFill{height:100%; width:0%; background:linear-gradient(90deg,var(--teal),var(--accent)); transition:width .5s cubic-bezier(.4,0,.2,1)}
#topProgPct{font-size:.8rem; color:var(--muted); min-width:34px; text-align:right; font-variant-numeric:tabular-nums}
#menuBtn{display:none; background:var(--bg-2); border:1px solid var(--border); color:var(--text); width:38px;height:38px;border-radius:9px; font-size:1.2rem; cursor:pointer; align-items:center; justify-content:center}
#menuBtn:active{transform:scale(.94)}

/* ============================ SIDEBAR ============================ */
#sidebar{
  position:fixed; top:54px; bottom:0; left:0; width:var(--sidebar-w); z-index:50;
  background:linear-gradient(180deg,#0f1421, #0c1019); border-right:1px solid var(--border);
  overflow-y:auto; padding:14px 12px 60px; transition:transform .28s ease;
}
.nav-top{display:flex; gap:8px; margin-bottom:12px}
.nav-top a{
  flex:1; text-align:center; padding:9px 6px; border-radius:10px; font-size:.86rem; font-weight:600;
  background:var(--bg-2); border:1px solid var(--border); color:var(--text-soft);
}
.nav-top a.active{background:var(--accent); color:#1a1405; border-color:var(--accent)}
.nav-top a:hover{text-decoration:none; border-color:var(--border-2)}

.lesson-group{margin-bottom:7px; border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--panel)}
.lesson-head{
  display:flex; align-items:center; gap:10px; padding:11px 12px; cursor:pointer; user-select:none;
  transition:background .15s;
}
.lesson-head:hover{background:var(--panel-2)}
.lesson-head .lnum{
  flex:none; width:30px; height:30px; border-radius:8px; display:grid; place-items:center;
  font-weight:700; font-size:.92rem; background:var(--bg-3); color:var(--accent); border:1px solid var(--border-2);
}
.lesson-head .ltit{flex:1; font-size:.92rem; font-weight:600; line-height:1.25}
.lesson-head .lchev{flex:none; color:var(--muted); transition:transform .2s; font-size:.8rem}
.lesson-group.open .lchev{transform:rotate(90deg)}
.ring{flex:none; width:30px;height:30px}
.ring svg{transform:rotate(-90deg)}
.ring .bg{stroke:var(--bg-3)} .ring .fg{stroke:var(--teal); transition:stroke-dashoffset .5s}
.ring .pct{font-size:.62rem; fill:var(--muted); transform:rotate(90deg); text-anchor:middle; font-family:var(--sans)}

.section-list{max-height:0; overflow:hidden; transition:max-height .3s ease}
.lesson-group.open .section-list{max-height:1200px}
.section-item{
  display:flex; align-items:center; gap:9px; padding:8px 12px 8px 16px; cursor:pointer; font-size:.86rem;
  color:var(--text-soft); border-top:1px solid var(--border); transition:background .12s,color .12s;
}
.section-item:hover{background:var(--panel-2); color:#fff}
.section-item.active{background:var(--accent-soft); color:#fff; box-shadow:inset 3px 0 0 var(--accent)}
.section-item .snum{color:var(--muted); font-variant-numeric:tabular-nums; flex:none}
.section-item .stit{flex:1}
.section-item .scheck{flex:none; width:18px;height:18px; border-radius:50%; border:1.5px solid var(--border-2); display:grid; place-items:center; font-size:.7rem}
.section-item.done .scheck{background:var(--good); border-color:var(--good); color:#05231a}
.section-item.quizrow{font-style:italic; color:var(--muted)}
.section-item.quizrow .snum{color:var(--violet)}

.side-reset{margin-top:14px; text-align:center}
.side-reset button{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 12px;border-radius:8px;cursor:pointer;font-size:.8rem}
.side-reset button:hover{border-color:var(--bad); color:var(--bad)}

#scrim{position:fixed; inset:54px 0 0 0; background:rgba(0,0,0,.5); z-index:40; opacity:0; pointer-events:none; transition:opacity .25s}
#scrim.show{opacity:1; pointer-events:auto}

/* ============================ MAIN ============================ */
#main{margin-left:var(--sidebar-w); margin-top:54px; padding:34px clamp(16px,4vw,60px) 120px; max-width:980px}
.view{animation:fadeUp .4s cubic-bezier(.2,.7,.3,1)}
@keyframes fadeUp{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}

.crumb{font-size:.82rem; color:var(--muted); margin-bottom:6px; letter-spacing:.4px; text-transform:uppercase}
.view h1.title{font-size:clamp(1.6rem,4.5vw,2.35rem); margin:.1em 0 .15em}
.view .subtitle{color:var(--muted); font-size:1.02rem; margin-bottom:8px}
.sec-divider{height:1px;background:linear-gradient(90deg,var(--border),transparent); margin:18px 0 26px}

/* content blocks */
.blk{margin:0 0 17px}
.blk.h{font-family:var(--serif); font-size:1.32rem; margin:34px 0 12px; color:#fff; padding-bottom:7px; border-bottom:1px solid var(--border)}
.blk.h .hicon{color:var(--accent); margin-right:8px}
.blk.sub{font-family:var(--serif); font-size:1.08rem; color:var(--teal); margin:22px 0 8px}
p.blk{color:var(--text-soft)}
.blk ul,.blk ol{color:var(--text-soft); padding-left:1.3em; margin:0 0 17px}
.blk li{margin:5px 0}
.blk.lead{font-size:1.1rem; color:var(--text)}
mark.k{background:var(--accent-soft); color:var(--accent); padding:.02em .28em; border-radius:4px; font-weight:600}
mark.t{background:var(--teal-soft); color:var(--teal); padding:.02em .28em; border-radius:4px}

.box{border-radius:var(--radius); padding:16px 18px; margin:0 0 20px; position:relative; border:1px solid var(--border)}
.box .box-tag{display:flex; width:fit-content; align-items:center; gap:7px; font-size:.72rem; font-weight:700; letter-spacing:.7px; text-transform:uppercase; margin-bottom:9px}
.box .box-title{font-family:var(--serif); font-size:1.06rem; margin:0 0 7px; color:#fff}
.box p:last-child{margin-bottom:0}
.box-def{background:linear-gradient(180deg,var(--accent-soft),transparent 70%),var(--panel); border-left:4px solid var(--accent)}
.box-def .box-tag{color:var(--accent)}
.box-def .term{font-family:var(--serif); font-size:1.12rem; color:var(--accent); font-weight:600}
.box-ex{background:linear-gradient(180deg,var(--teal-soft),transparent 70%),var(--panel); border-left:4px solid var(--teal)}
.box-ex .box-tag{color:var(--teal)}
.box-why{background:linear-gradient(180deg,var(--blue-soft),transparent 70%),var(--panel); border-left:4px solid var(--blue)}
.box-why .box-tag{color:var(--blue)}
.box-aha{background:linear-gradient(135deg,#2a2410,#2a1d2e); border:1px solid #4a3d1e}
.box-aha .box-tag{color:var(--accent)}
.box-quote{background:var(--panel); border:1px solid var(--border); border-left:4px solid var(--violet); font-family:var(--serif); font-style:italic; font-size:1.05rem; color:var(--text)}
.box-quote .qsource{display:block; font-style:normal; font-family:var(--sans); font-size:.8rem; color:var(--muted); margin-top:9px}
.box-quote::before{content:"“"; font-family:var(--serif); font-size:2.4rem; color:var(--violet); line-height:0; position:absolute; top:22px; left:10px; opacity:.4}
.box-quote{padding-left:30px}
.box-warn{background:linear-gradient(180deg,var(--bad-soft),transparent 70%),var(--panel); border-left:4px solid var(--bad)}
.box-warn .box-tag{color:var(--bad)}

/* formula */
.formula{background:#0b0f18; border:1px solid var(--border); border-radius:var(--radius-s); padding:14px 16px; margin:0 0 20px; overflow-x:auto; text-align:center; position:relative}
.formula .fcap{display:block; text-align:left; font-size:.8rem; color:var(--muted); margin-top:9px; border-top:1px dashed var(--border); padding-top:8px}
.formula mjx-container{margin:0 !important}
.formula.named{border-left:4px solid var(--accent)}

/* tables */
.tbl-wrap{overflow-x:auto; margin:0 0 22px; border:1px solid var(--border); border-radius:var(--radius-s)}
table.data{border-collapse:collapse; width:100%; font-size:.9rem; min-width:340px}
table.data caption{caption-side:bottom; text-align:left; padding:8px 12px; font-size:.78rem; color:var(--muted)}
table.data th,table.data td{padding:8px 12px; text-align:right; border-bottom:1px solid var(--border); white-space:nowrap}
table.data th{background:var(--bg-2); color:var(--text); font-weight:600; position:sticky; top:0}
table.data td:first-child,table.data th:first-child{text-align:left}
table.data tr:hover td{background:rgba(84,199,192,.05)}
table.data tr.hl td{background:var(--accent-soft)}
table.data.compact td,table.data.compact th{padding:5px 9px; font-size:.83rem}

/* ============================ WIDGET CARD ============================ */
.widget{background:var(--panel); border:1px solid var(--border-2); border-radius:var(--radius); margin:6px 0 26px; box-shadow:var(--shadow); overflow:hidden}
.widget-bar{display:flex; align-items:center; gap:10px; padding:11px 16px; background:linear-gradient(90deg,var(--bg-3),var(--panel)); border-bottom:1px solid var(--border)}
.widget-bar .wico{font-size:1.05rem}
.widget-bar .wtitle{font-family:var(--serif); font-weight:600; font-size:1rem; color:#fff; flex:1}
.widget-bar .wtag{font-size:.66rem; text-transform:uppercase; letter-spacing:.8px; color:var(--teal); background:var(--teal-soft); padding:3px 8px; border-radius:20px; font-weight:700}
.widget-body{padding:16px}
.widget-hint{font-size:.85rem; color:var(--muted); margin:0 0 12px}

/* controls */
.ctrl-row{display:flex; flex-wrap:wrap; gap:14px 20px; align-items:flex-end; margin-bottom:14px}
.ctrl{display:flex; flex-direction:column; gap:5px; min-width:120px}
.ctrl label{font-size:.78rem; color:var(--muted); font-weight:600}
.ctrl .val{color:var(--accent); font-variant-numeric:tabular-nums; font-weight:700}
input[type=range]{-webkit-appearance:none; appearance:none; height:6px; background:var(--bg-3); border-radius:5px; outline:none; width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:18px;height:18px;border-radius:50%; background:var(--accent); cursor:pointer; border:2px solid #1a1405; box-shadow:0 1px 4px rgba(0,0,0,.5)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%; background:var(--accent); cursor:pointer; border:2px solid #1a1405}
input[type=text],input[type=number],textarea,select{
  background:var(--bg-1); border:1px solid var(--border-2); color:var(--text); border-radius:8px; padding:8px 10px; font-family:var(--mono); font-size:.92rem; width:100%;
}
input:focus,textarea:focus,select:focus{outline:none; border-color:var(--teal); box-shadow:0 0 0 3px var(--teal-soft)}
textarea{font-family:var(--mono); resize:vertical; min-height:54px}
.btn{display:inline-flex; align-items:center; gap:7px; background:var(--bg-3); color:var(--text); border:1px solid var(--border-2); padding:8px 15px; border-radius:9px; cursor:pointer; font-size:.9rem; font-weight:600; transition:.15s}
.btn:hover{border-color:var(--teal); background:var(--panel-2)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--accent); color:#1a1405; border-color:var(--accent)}
.btn.primary:hover{filter:brightness(1.08)}
.btn.ghost{background:none}
.btn-row{display:flex; gap:9px; flex-wrap:wrap; margin:6px 0}
.chips{display:flex; gap:8px; flex-wrap:wrap}
.chip{padding:6px 12px; border-radius:20px; background:var(--bg-3); border:1px solid var(--border-2); cursor:pointer; font-size:.83rem; transition:.12s}
.chip:hover{border-color:var(--teal)}
.chip.active{background:var(--teal); color:#04201e; border-color:var(--teal); font-weight:600}

.canvas-wrap{position:relative; width:100%; background:#0a0e16; border:1px solid var(--border); border-radius:10px; overflow:hidden}
.canvas-wrap canvas{display:block; width:100%; touch-action:none}
.readout{display:flex; flex-wrap:wrap; gap:10px; margin-top:12px}
.stat{flex:1; min-width:92px; background:var(--bg-2); border:1px solid var(--border); border-radius:10px; padding:9px 12px; text-align:center}
.stat .v{font-size:1.18rem; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; font-family:var(--mono)}
.stat .l{font-size:.72rem; color:var(--muted); margin-top:2px}
.stat.teal .v{color:var(--teal)} .stat.violet .v{color:var(--violet)} .stat.good .v{color:var(--good)} .stat.blue .v{color:var(--blue)}
.steps{counter-reset:st; margin:8px 0}
.steps .step{position:relative; padding:8px 0 8px 38px; border-left:2px solid var(--border); margin-left:13px}
.steps .step::before{counter-increment:st; content:counter(st); position:absolute; left:-14px; top:7px; width:26px;height:26px; border-radius:50%; background:var(--bg-3); border:1px solid var(--border-2); color:var(--accent); display:grid; place-items:center; font-size:.8rem; font-weight:700; font-family:var(--mono)}
.steps .step .sk{color:var(--muted); font-size:.82rem; display:block}

/* ============================ QUIZ ============================ */
.quiz-card{background:var(--panel); border:1px solid var(--border-2); border-radius:var(--radius); padding:6px 0; margin:8px 0 26px; box-shadow:var(--shadow)}
.quiz-head{padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px}
.quiz-head .qh-ico{font-size:1.5rem}
.quiz-head h3{margin:0; font-size:1.15rem}
.quiz-head .qmeta{margin-left:auto; font-size:.84rem; color:var(--muted)}
.q-block{padding:18px 20px; border-bottom:1px solid var(--border)}
.q-block:last-child{border-bottom:none}
.q-num{font-size:.76rem; color:var(--violet); font-weight:700; letter-spacing:.5px}
.q-text{font-size:1.04rem; margin:6px 0 13px; color:#fff}
.q-opts{display:flex; flex-direction:column; gap:9px}
.opt{display:flex; gap:11px; align-items:flex-start; padding:11px 14px; border:1px solid var(--border-2); border-radius:10px; cursor:pointer; transition:.13s; background:var(--bg-1)}
.opt:hover{border-color:var(--teal); background:var(--panel-2)}
.opt .mark{flex:none; width:22px;height:22px;border-radius:50%; border:1.5px solid var(--border-2); display:grid; place-items:center; font-size:.78rem; font-weight:700}
.opt.correct{border-color:var(--good); background:var(--good-soft)} .opt.correct .mark{background:var(--good); border-color:var(--good); color:#04231a}
.opt.wrong{border-color:var(--bad); background:var(--bad-soft)} .opt.wrong .mark{background:var(--bad); border-color:var(--bad); color:#2a0c0c}
.opt.disabled{cursor:default; opacity:.92}
.q-explain{margin-top:12px; padding:11px 14px; background:var(--bg-2); border-radius:9px; border-left:3px solid var(--teal); font-size:.92rem; color:var(--text-soft); display:none}
.q-explain.show{display:block; animation:fadeUp .3s}
.quiz-foot{padding:16px 20px; display:flex; align-items:center; gap:14px; flex-wrap:wrap}
.quiz-score{font-size:1.05rem; font-weight:600}
.scorebar{flex:1; min-width:120px; height:10px; background:var(--bg-2); border-radius:6px; overflow:hidden; border:1px solid var(--border)}
.scorebar .fill{height:100%; width:0; background:linear-gradient(90deg,var(--bad),var(--warn),var(--good)); transition:width .6s}

/* ============================ DASHBOARD ============================ */
.hero{background:linear-gradient(135deg,#15203a,#15282a); border:1px solid var(--border-2); border-radius:var(--radius); padding:26px 26px; margin-bottom:24px; position:relative; overflow:hidden}
.hero::after{content:"∑"; position:absolute; right:-10px; bottom:-40px; font-size:13rem; font-family:var(--serif); color:rgba(231,181,76,.06); pointer-events:none}
.hero h1{font-size:clamp(1.7rem,5vw,2.5rem); margin:0 0 8px}
.hero p{color:var(--text-soft); max-width:60ch; margin:.3em 0}
.hero .pill{display:inline-block; font-size:.78rem; color:var(--accent); background:var(--accent-soft); padding:4px 11px; border-radius:20px; margin-bottom:10px; letter-spacing:.4px}
.dash-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(225px,1fr)); gap:14px; margin:18px 0}
.dash-card{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; transition:.16s; position:relative; overflow:hidden}
.dash-card:hover{border-color:var(--teal); transform:translateY(-3px); box-shadow:var(--shadow)}
.dash-card .dc-num{font-family:var(--serif); font-size:.84rem; color:var(--accent); font-weight:700}
.dash-card .dc-tit{font-family:var(--serif); font-size:1.08rem; color:#fff; margin:3px 0 10px; line-height:1.25}
.dash-card .dc-bar{height:6px; background:var(--bg-2); border-radius:5px; overflow:hidden}
.dash-card .dc-bar .f{height:100%; background:linear-gradient(90deg,var(--teal),var(--accent)); width:0; transition:width .6s}
.dash-card .dc-meta{font-size:.76rem; color:var(--muted); margin-top:7px; display:flex; justify-content:space-between}
.overall{display:flex; align-items:center; gap:18px; flex-wrap:wrap; margin-top:14px}
.overall .big{font-size:2.4rem; font-family:var(--serif); color:var(--accent); font-weight:700}

/* section nav buttons */
.sec-nav{display:flex; justify-content:space-between; gap:12px; margin-top:36px; flex-wrap:wrap}
.sec-nav .btn{flex:1; min-width:140px; justify-content:center}

<script>
/* ===================================================================
   BSTA01-02 Lernapp – Shell / Framework
   Aufbau:  Utils → Stats → Plot → Charts → State/Progress →
            Renderer (Blöcke) → Quiz → Sidebar → Router → Lesson-Registry
   =================================================================== */
"use strict";

/* ============================ UTILS ============================ */
function el(tag, attrs, ...kids){
  const n = document.createElement(tag);
  if(attrs) for(const k in attrs){
    const v = attrs[k];
    if(k==="class") n.className = v;
    else if(k==="html") n.innerHTML = v;
    else if(k==="text") n.textContent = v;
    else if(k==="style" && typeof v==="object") Object.assign(n.style, v);
    else if(k.startsWith("on") && typeof v==="function") n.addEventListener(k.slice(2).toLowerCase(), v);
    else if(v!==null && v!==undefined && v!==false) n.setAttribute(k, v);
  }
  for(let c of kids.flat()){
    if(c===null||c===undefined||c===false) continue;
    n.appendChild(typeof c==="string"||typeof c==="number" ? document.createTextNode(c) : c);
  }
  return n;
}
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];

/* number formatting (German: comma decimal) */
const fmt = {
  n(x, d=2){
    if(x===null||x===undefined||Number.isNaN(x)) return "–";
    if(!isFinite(x)) return x>0?"∞":"−∞";
    let s = Number(x).toLocaleString("de-DE",{minimumFractionDigits:d, maximumFractionDigits:d});
    return s;
  },
  // auto decimals
  a(x){ if(x===null||x===undefined||Number.isNaN(x))return"–"; const ax=Math.abs(x);
        let d = ax>=100?1: ax>=1?2: ax>=0.1?3:4; return fmt.n(x,d); },
  int(x){ return Number(x).toLocaleString("de-DE"); },
  pct(x,d=1){ return fmt.n(x*100,d)+" %"; }
};
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
function range(a,b,step=1){const r=[];for(let i=a;i<=b+1e-9;i+=step)r.push(+i.toFixed(10));return r;}
function parseNums(str){
  return (str||"").split(/[\s,;]+/).map(s=>s.replace(",", ".")).map(Number).filter(v=>!Number.isNaN(v) && isFinite(v));
}

/* ============================ STATS LIBRARY ============================ */
const Stats = (function(){
  const sum = a => a.reduce((s,x)=>s+x,0);
  const mean = a => a.length? sum(a)/a.length : NaN;
  function sortAsc(a){return [...a].sort((x,y)=>x-y);}

  // German/Bamberg empirical quantile (used in IU script):
  // pos = n*p ; if integer -> mean of x_(pos) and x_(pos+1) ; else x_(ceil(pos))
  function quantile(a,p){
    if(!a.length) return NaN;
    const s = sortAsc(a), n = s.length, pos = n*p;
    if(Math.abs(pos-Math.round(pos))<1e-9){
      const k = Math.round(pos);                // 1-based
      if(k<=0) return s[0];
      if(k>=n) return s[n-1];
      return (s[k-1]+s[k])/2;
    }
    return s[Math.ceil(pos)-1];
  }
  const median = a => quantile(a,0.5);
  function mode(a){
    const m=new Map(); a.forEach(x=>m.set(x,(m.get(x)||0)+1));
    let best=[],bc=0; m.forEach((c,v)=>{if(c>bc){bc=c;best=[v];}else if(c===bc)best.push(v);});
    return {values:best.sort((x,y)=>x-y), count:bc};
  }
  // sample variance (denominator n-1) – the script's "Stichprobenvarianz"
  function variance(a){const n=a.length; if(n<2)return NaN; const m=mean(a); return sum(a.map(x=>(x-m)**2))/(n-1);}
  function variancePop(a){const n=a.length; if(!n)return NaN; const m=mean(a); return sum(a.map(x=>(x-m)**2))/n;}
  const sd = a => Math.sqrt(variance(a));
  const sdPop = a => Math.sqrt(variancePop(a));
  const cv = a => sd(a)/mean(a);                 // Variationskoeffizient
  const range_ = a => Math.max(...a)-Math.min(...a);  // Spannweite
  const iqr = a => quantile(a,0.75)-quantile(a,0.25);

  function ranks(a){ // average ranks for ties
    const idx = a.map((v,i)=>[v,i]).sort((p,q)=>p[0]-q[0]);
    const r = new Array(a.length);
    let i=0;
    while(i<idx.length){ let j=i; while(j+1<idx.length && idx[j+1][0]===idx[i][0]) j++;
      const avg=(i+j)/2+1; for(let k=i;k<=j;k++) r[idx[k][1]]=avg; i=j+1; }
    return r;
  }
  // Kovarianz mit 1/n — konsistent mit der im Skript/Formelsammlung gelehrten Definition s_xy.
  function covariance(x,y){const n=x.length,mx=mean(x),my=mean(y);let s=0;for(let i=0;i<n;i++)s+=(x[i]-mx)*(y[i]-my);return s/n;}
  function pearson(x,y){
    const n=x.length,mx=mean(x),my=mean(y);
    let sxy=0,sxx=0,syy=0;
    for(let i=0;i<n;i++){const dx=x[i]-mx,dy=y[i]-my;sxy+=dx*dy;sxx+=dx*dx;syy+=dy*dy;}
    return sxy/Math.sqrt(sxx*syy);
  }
  function spearman(x,y){return pearson(ranks(x),ranks(y));}
  function spearmanSimple(x,y){ // 1 - 6Σd²/(n(n²-1)) (no ties)
    const rx=ranks(x),ry=ranks(y),n=x.length;
    let d2=0; for(let i=0;i<n;i++) d2+=(rx[i]-ry[i])**2;
    return 1-(6*d2)/(n*(n*n-1));
  }
  // simple linear regression y = a + b x  (least squares)
  function regression(x,y){
    const n=x.length,mx=mean(x),my=mean(y);
    let sxy=0,sxx=0;
    for(let i=0;i<n;i++){sxy+=(x[i]-mx)*(y[i]-my);sxx+=(x[i]-mx)**2;}
    const b=sxy/sxx, a=my-b*mx, r=pearson(x,y);
    return {a,b,r,r2:r*r};
  }
  // contingency table chi^2, C, C* (corrected)
  function chiSquare(obs){
    const R=obs.length,C=obs[0].length;
    const rt=obs.map(r=>r.reduce((s,v)=>s+v,0));
    const ct=obs[0].map((_,j)=>obs.reduce((s,r)=>s+r[j],0));
    const N=rt.reduce((s,v)=>s+v,0);
    let chi=0; const exp=[];
    for(let i=0;i<R;i++){exp.push([]);for(let j=0;j<C;j++){const e=rt[i]*ct[j]/N;exp[i].push(e); if(e>0)chi+=(obs[i][j]-e)**2/e;}}
    const k=Math.min(R,C);
    const C_=Math.sqrt(chi/(chi+N));
    const Cmax=Math.sqrt((k-1)/k);
    const Ccorr=C_/Cmax;
    return {chi2:chi, N, C:C_, Cmax, Ccorr, exp, rowSums:rt, colSums:ct, df:(R-1)*(C-1)};
  }

  /* ---- special functions ---- */
  function erf(x){ // Abramowitz & Stegun 7.1.26
    const s=x<0?-1:1; x=Math.abs(x);
    const t=1/(1+0.3275911*x);
    const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);
    return s*y;
  }
  function gammaln(x){
    const g=[76.18009172947146,-86.50532032941677,24.01409824083091,-1.231739572450155,0.1208650973866179e-2,-0.5395239384953e-5];
    let xx=x,y=x,tmp=x+5.5; tmp-=(x+0.5)*Math.log(tmp);
    let ser=1.000000000190015; for(let j=0;j<6;j++){y+=1;ser+=g[j]/y;}
    return -tmp+Math.log(2.5066282746310005*ser/xx);
  }
  function factorial(n){ if(n<0)return NaN; if(n<=170){let f=1;for(let i=2;i<=n;i++)f*=i;return f;} return Infinity; }
  function choose(n,k){ if(k<0||k>n)return 0; return Math.round(Math.exp(gammaln(n+1)-gammaln(k+1)-gammaln(n-k+1))); }

  // lower regularized incomplete gamma P(a,x) (Numerical Recipes)
  function gammp(a,x){
    if(x<0||a<=0)return NaN; if(x===0)return 0;
    if(x<a+1){ // series
      let ap=a,del=1/a,sum=1/a;
      for(let n=0;n<200;n++){ap++;del*=x/ap;sum+=del;if(Math.abs(del)<Math.abs(sum)*1e-12)break;}
      return sum*Math.exp(-x+a*Math.log(x)-gammaln(a));
    }else{ // continued fraction
      let b=x+1-a,c=1e30,d=1/b,h=d;
      for(let i=1;i<=200;i++){const an=-i*(i-a);b+=2;d=an*d+b;if(Math.abs(d)<1e-30)d=1e-30;c=b+an/c;if(Math.abs(c)<1e-30)c=1e-30;d=1/d;const del=d*c;h*=del;if(Math.abs(del-1)<1e-12)break;}
      return 1-Math.exp(-x+a*Math.log(x)-gammaln(a))*h;
    }
  }
  const chiSquareCdf=(x,k)=>gammp(k/2,x/2);

  // regularized incomplete beta I_x(a,b)
  function betai(a,b,x){
    if(x<=0)return 0; if(x>=1)return 1;
    const bt=Math.exp(gammaln(a+b)-gammaln(a)-gammaln(b)+a*Math.log(x)+b*Math.log(1-x));
    function bcf(a,b,x){
      const MAXIT=200,EPS=1e-12,FPMIN=1e-30;
      let qab=a+b,qap=a+1,qam=a-1,c=1,d=1-qab*x/qap;
      if(Math.abs(d)<FPMIN)d=FPMIN; d=1/d; let h=d;
      for(let m=1;m<=MAXIT;m++){
        const m2=2*m;
        let aa=m*(b-m)*x/((qam+m2)*(a+m2)); d=1+aa*d; if(Math.abs(d)<FPMIN)d=FPMIN; c=1+aa/c; if(Math.abs(c)<FPMIN)c=FPMIN; d=1/d; h*=d*c;
        aa=-(a+m)*(qab+m)*x/((a+m2)*(qap+m2)); d=1+aa*d; if(Math.abs(d)<FPMIN)d=FPMIN; c=1+aa/c; if(Math.abs(c)<FPMIN)c=FPMIN; d=1/d; const del=d*c; h*=del;
        if(Math.abs(del-1)<EPS)break;
      } return h;
    }
    if(x<(a+1)/(a+b+2)) return bt*bcf(a,b,x)/a;
    return 1-bt*bcf(b,a,1-x)/b;
  }

  /* ---- distributions ---- */
  const normalPdf=(x,mu=0,s=1)=>Math.exp(-((x-mu)**2)/(2*s*s))/(s*Math.sqrt(2*Math.PI));
  const normalCdf=(x,mu=0,s=1)=>0.5*(1+erf((x-mu)/(s*Math.SQRT2)));
  // inverse standard normal (Acklam)
  function normalInv(p){
    if(p<=0)return -Infinity; if(p>=1)return Infinity;
    const a=[-3.969683028665376e+01,2.209460984245205e+02,-2.759285104469687e+02,1.383577518672690e+02,-3.066479806614716e+01,2.506628277459239e+00];
    const b=[-5.447609879822406e+01,1.615858368580409e+02,-1.556989798598866e+02,6.680131188771972e+01,-1.328068155288572e+01];
    const c=[-7.784894002430293e-03,-3.223964580411365e-01,-2.400758277161838e+00,-2.549732539343734e+00,4.374664141464968e+00,2.938163982698783e+00];
    const d=[7.784695709041462e-03,3.224671290700398e-01,2.445134137142996e+00,3.754408661907416e+00];
    const pl=0.02425;let q,r;
    if(p<pl){q=Math.sqrt(-2*Math.log(p));return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);}
    if(p<=1-pl){q=p-0.5;r=q*q;return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1);}
    q=Math.sqrt(-2*Math.log(1-p));return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
  }
  function tPdf(x,df){return Math.exp(gammaln((df+1)/2)-gammaln(df/2))/Math.sqrt(df*Math.PI)*Math.pow(1+x*x/df,-(df+1)/2);}
  function tCdf(x,df){const xx=df/(df+x*x);const ib=0.5*betai(df/2,0.5,xx);return x>0?1-ib:ib;}
  function tQuantile(p,df){ // bisection on tCdf
    if(p<=0)return -Infinity; if(p>=1)return Infinity;
    // Grenzen weit genug, damit auch t(0,995; df=1)=63,657 (und größere) nicht
    // an die Intervallgrenze geklemmt werden. 200 Halbierungen → Maschinengenauigkeit.
    let lo=-1e6,hi=1e6;
    for(let i=0;i<200;i++){const m=(lo+hi)/2; (tCdf(m,df)<p)?lo=m:hi=m;}
    return (lo+hi)/2;
  }
  const binomPmf=(k,n,p)=>{
    if(k<0||k>n) return 0;
    if(p<=0) return k===0?1:0;   // 0·log(0) wäre NaN — Randfall p=0 sauber abfangen
    if(p>=1) return k===n?1:0;   // dito p=1
    return Math.exp(gammaln(n+1)-gammaln(k+1)-gammaln(n-k+1)+k*Math.log(p)+(n-k)*Math.log(1-p));
  };
  function binomCdf(k,n,p){let s=0;for(let i=0;i<=k;i++)s+=binomPmf(i,n,p);return s;}
  const poissonPmf=(k,l)=> (k<0)?0: (l<=0? (k===0?1:0): Math.exp(-l+k*Math.log(l)-gammaln(k+1)));
  function poissonCdf(k,l){let s=0;for(let i=0;i<=k;i++)s+=poissonPmf(i,l);return s;}
  const expPdf=(x,l)=> x<0?0: l*Math.exp(-l*x);
  const expCdf=(x,l)=> x<0?0: 1-Math.exp(-l*x);
  const uniPdf=(x,a,b)=> (x<a||x>b)?0:1/(b-a);
  const uniCdf=(x,a,b)=> x<a?0: x>b?1:(x-a)/(b-a);

  return {sum,mean,median,quantile,mode,variance,variancePop,sd,sdPop,cv,range:range_,iqr,
    ranks,covariance,pearson,spearman,spearmanSimple,regression,chiSquare,
    erf,gammaln,factorial,choose,gammp,chiSquareCdf,betai,
    normalPdf,normalCdf,normalInv,tPdf,tCdf,tQuantile,
    binomPmf,binomCdf,poissonPmf,poissonCdf,expPdf,expCdf,uniPdf,uniCdf,sortAsc};
})();

/* ============================ PLOT (canvas) ============================ */
/* Coordinate-aware canvas helper for bespoke plots (curves, areas, draggable pts). */
function Plot(container, opts={}){
  opts = Object.assign({xmin:0,xmax:1,ymin:0,ymax:1,padL:46,padR:14,padT:14,padB:34,height:300,bg:"#0a0e16",grid:true}, opts);
  const wrap = container.classList && container.classList.contains("canvas-wrap") ? container
             : el("div",{class:"canvas-wrap"});
  if(wrap!==container) container.appendChild(wrap);
  const cv = el("canvas"); wrap.appendChild(cv);
  const ctx = cv.getContext("2d");
  let W=0,H=opts.height,dpr=Math.min(window.devicePixelRatio||1,2.5);
  const P = {opts, cv, ctx, wrap};

  function resize(){
    W = wrap.clientWidth || 600;
    cv.width=W*dpr; cv.height=H*dpr; cv.style.height=H+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  P.X = x => opts.padL + (x-opts.xmin)/(opts.xmax-opts.xmin)*(W-opts.padL-opts.padR);
  P.Y = y => H-opts.padB - (y-opts.ymin)/(opts.ymax-opts.ymin)*(H-opts.padT-opts.padB);
  P.invX = px => opts.xmin + (px-opts.padL)/(W-opts.padL-opts.padR)*(opts.xmax-opts.xmin);
  P.invY = py => opts.ymin + (H-opts.padB-py)/(H-opts.padT-opts.padB)*(opts.ymax-opts.ymin);
  P.w = ()=>W; P.h = ()=>H;

  P.clear=()=>{ctx.clearRect(0,0,W,H); if(opts.bg){ctx.fillStyle=opts.bg;ctx.fillRect(0,0,W,H);} return P;};
  P.setY=(ymin,ymax)=>{opts.ymin=ymin;opts.ymax=ymax;return P;};
  P.setX=(xmin,xmax)=>{opts.xmin=xmin;opts.xmax=xmax;return P;};

  P.axes=(o={})=>{
    o=Object.assign({xticks:6,yticks:5,xlabel:"",ylabel:"",xfmt:fmt.a,yfmt:fmt.a,color:"#33405e",text:"#8d9bb5",y0line:true},o);
    ctx.strokeStyle=o.color;ctx.fillStyle=o.text;ctx.lineWidth=1;ctx.font="11px "+getCSS("--sans","sans-serif");
    ctx.textAlign="center";ctx.textBaseline="top";
    const xs=niceTicks(opts.xmin,opts.xmax,o.xticks);
    for(const xv of xs){const px=P.X(xv);
      if(opts.grid){ctx.strokeStyle="rgba(255,255,255,.045)";ctx.beginPath();ctx.moveTo(px,opts.padT);ctx.lineTo(px,H-opts.padB);ctx.stroke();}
      ctx.strokeStyle=o.color;ctx.beginPath();ctx.moveTo(px,H-opts.padB);ctx.lineTo(px,H-opts.padB+4);ctx.stroke();
      ctx.fillText(o.xfmt(xv),px,H-opts.padB+6);
    }
    ctx.textAlign="right";ctx.textBaseline="middle";
    const ys=niceTicks(opts.ymin,opts.ymax,o.yticks);
    for(const yv of ys){const py=P.Y(yv);
      if(opts.grid){ctx.strokeStyle="rgba(255,255,255,.045)";ctx.beginPath();ctx.moveTo(opts.padL,py);ctx.lineTo(W-opts.padR,py);ctx.stroke();}
      ctx.strokeStyle=o.color;ctx.beginPath();ctx.moveTo(opts.padL-4,py);ctx.lineTo(opts.padL,py);ctx.stroke();
      ctx.fillText(o.yfmt(yv),opts.padL-7,py);
    }
    // axis lines
    ctx.strokeStyle=o.color;ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(opts.padL,opts.padT);ctx.lineTo(opts.padL,H-opts.padB);ctx.lineTo(W-opts.padR,H-opts.padB);ctx.stroke();
    if(o.xlabel){ctx.fillStyle=o.text;ctx.textAlign="center";ctx.textBaseline="bottom";ctx.font="12px "+getCSS("--sans","sans-serif");ctx.fillText(o.xlabel,(opts.padL+W-opts.padR)/2,H-2);}
    if(o.ylabel){ctx.save();ctx.translate(11,(opts.padT+H-opts.padB)/2);ctx.rotate(-Math.PI/2);ctx.textAlign="center";ctx.textBaseline="top";ctx.fillStyle=o.text;ctx.fillText(o.ylabel,0,0);ctx.restore();}
    return P;
  };
  P.func=(f,o={})=>{o=Object.assign({color:"#e7b54c",width:2.2,n:240},o);
    ctx.strokeStyle=o.color;ctx.lineWidth=o.width;ctx.beginPath();let started=false;
    for(let i=0;i<=o.n;i++){const x=opts.xmin+(opts.xmax-opts.xmin)*i/o.n;const y=f(x);
      if(!isFinite(y)){started=false;continue;} const px=P.X(x),py=P.Y(y);
      if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);}
    ctx.stroke();return P;};
  P.area=(f,x0,x1,o={})=>{o=Object.assign({color:"rgba(231,181,76,.28)",n:160},o);
    ctx.fillStyle=o.color;ctx.beginPath();
    const a=Math.max(x0,opts.xmin),b=Math.min(x1,opts.xmax);
    ctx.moveTo(P.X(a),P.Y(0));
    for(let i=0;i<=o.n;i++){const x=a+(b-a)*i/o.n;ctx.lineTo(P.X(x),P.Y(Math.max(opts.ymin,f(x))));}
    ctx.lineTo(P.X(b),P.Y(0));ctx.closePath();ctx.fill();return P;};
  P.line=(pts,o={})=>{o=Object.assign({color:"#54c7c0",width:2,dash:null},o);
    ctx.strokeStyle=o.color;ctx.lineWidth=o.width;ctx.setLineDash(o.dash||[]);ctx.beginPath();
    pts.forEach((p,i)=> i?ctx.lineTo(P.X(p[0]),P.Y(p[1])):ctx.moveTo(P.X(p[0]),P.Y(p[1])));
    ctx.stroke();ctx.setLineDash([]);return P;};
  P.vline=(x,o={})=>{o=Object.assign({color:"#f0726f",width:1.8,dash:[5,4]},o);
    ctx.strokeStyle=o.color;ctx.lineWidth=o.width;ctx.setLineDash(o.dash||[]);
    ctx.beginPath();ctx.moveTo(P.X(x),opts.padT);ctx.lineTo(P.X(x),H-opts.padB);ctx.stroke();ctx.setLineDash([]);return P;};
  P.hline=(y,o={})=>{o=Object.assign({color:"#54c7c0",width:1.4,dash:[5,4]},o);
    ctx.strokeStyle=o.color;ctx.lineWidth=o.width;ctx.setLineDash(o.dash||[]);
    ctx.beginPath();ctx.moveTo(opts.padL,P.Y(y));ctx.lineTo(W-opts.padR,P.Y(y));ctx.stroke();ctx.setLineDash([]);return P;};
  P.points=(pts,o={})=>{o=Object.assign({color:"#54c7c0",r:4,stroke:"#0a0e16"},o);
    pts.forEach(p=>{ctx.beginPath();ctx.arc(P.X(p[0]),P.Y(p[1]),o.r,0,7);ctx.fillStyle=o.color;ctx.fill();
      if(o.stroke){ctx.lineWidth=1.5;ctx.strokeStyle=o.stroke;ctx.stroke();}});return P;};
  P.bars=(items,o={})=>{ // items: [{x0,x1,h,color}] in data coords
    o=Object.assign({stroke:"#0a0e16"},o);
    items.forEach(b=>{const x=P.X(b.x0),w=P.X(b.x1)-P.X(b.x0),y=P.Y(b.h),h=P.Y(0)-P.Y(b.h);
      ctx.fillStyle=b.color||"#54c7c0";ctx.fillRect(x+0.5,y,Math.max(1,w-1),h);
      if(o.stroke){ctx.strokeStyle=o.stroke;ctx.lineWidth=1;ctx.strokeRect(x+0.5,y,Math.max(1,w-1),h);}});return P;};
  P.text=(x,y,str,o={})=>{o=Object.assign({color:"#e8ecf4",align:"left",baseline:"bottom",font:"12px "+getCSS("--sans","sans-serif"),px:false},o);
    ctx.fillStyle=o.color;ctx.textAlign=o.align;ctx.textBaseline=o.baseline;ctx.font=o.font;
    ctx.fillText(str, o.px?x:P.X(x), o.px?y:P.Y(y));return P;};
  P.ctx=ctx;
  P.resize=resize;
  // pointer -> data coords (for draggable widgets); pass a mouse/touch/pointer event
  P.pointer=(evt)=>{const r=cv.getBoundingClientRect();
    const cx=(evt.touches&&evt.touches[0]?evt.touches[0].clientX:evt.clientX)-r.left;
    const cy=(evt.touches&&evt.touches[0]?evt.touches[0].clientY:evt.clientY)-r.top;
    return {px:cx,py:cy,x:P.invX(cx),y:P.invY(cy)};};
  P.onResize=null;
  const ro = new ResizeObserver(()=>{const old=W;resize();if(P.onResize)P.onResize();});
  ro.observe(wrap);
  P.destroy=()=>{try{ro.disconnect();}catch(e){}};
  resize();
  return P;
}
function niceTicks(min,max,n){
  if(min===max){return [min];}
  const span=max-min, step0=span/Math.max(1,n), mag=Math.pow(10,Math.floor(Math.log10(step0)));
  const norm=step0/mag; let step= norm<1.5?1: norm<3?2: norm<7?5:10; step*=mag;
  const start=Math.ceil(min/step)*step, out=[];
  for(let v=start;v<=max+step*1e-6;v+=step) out.push(+v.toFixed(10));
  return out;
}

/* ============================ STATE / PROGRESS ============================ */
const LESSONS=[]; // filled by registerLesson()
const STORE_KEY="bsta01_progress_v2";
let progress = loadProgress();
function loadProgress(){ try{return JSON.parse(localStorage.getItem(STORE_KEY))||{done:{},quiz:{}};}catch(e){return {done:{},quiz:{}};} }
function saveProgress(){ try{localStorage.setItem(STORE_KEY,JSON.stringify(progress));}catch(e){} }
function markDone(secId,val){ if(val)progress.done[secId]=1; else delete progress.done[secId]; saveProgress(); updateProgressUI(); }
function isDone(secId){return !!progress.done[secId];}
function saveQuiz(lid,score,total){
  const prev=progress.quiz[lid];
  // Besten Versuch behalten: einen schlechteren Score NICHT über einen besseren schreiben.
  if(!prev || score/total >= prev.score/prev.total){ progress.quiz[lid]={score,total}; }
  saveProgress(); updateProgressUI();
}
// Ein Quiz zählt erst als bestanden (und damit als Fortschritt), wenn ≥ 80 % erreicht sind.
function quizPassed(lid){ const q=progress.quiz[lid]; return !!(q && q.total>0 && q.score/q.total>=0.8); }

function lessonSections(L){return L.sections;}
function lessonProgress(L){
  const secs=lessonSections(L); const done=secs.filter(s=>isDone(L.id+"-"+s.idx)).length;
  let total=secs.length, hit=done;
  if(L.quiz&&L.quiz.length){ total+=1; if(quizPassed(L.id)) hit+=1; }
  return total? hit/total : 0;
}
function overallProgress(){
  let t=0,h=0;
  LESSONS.forEach(L=>{const secs=lessonSections(L);t+=secs.length;h+=secs.filter(s=>isDone(L.id+"-"+s.idx)).length;
    if(L.quiz&&L.quiz.length){t+=1;if(quizPassed(L.id))h+=1;}});
  return t? h/t : 0;
}

function renderBlock(b){

    case "sub":  return el("h3",{class:"blk sub",html:b.html||b.text});
    case "list": {const L=el(b.ordered?"ol":"ul",{class:"blk"}); (b.items||[]).forEach(i=>L.appendChild(el("li",{html:i}))); return L;}
    case "def":  return box("def","Definition","📐", b.term?el("div",{class:"term"},b.term):null, b.title?el("div",{class:"box-title"},b.title):null, htmlFrag(b.html));
    case "example": return box("ex","Beispiel","🧮", b.title?el("div",{class:"box-title"},b.title):null, htmlFrag(b.html));
    case "why":  return box("why","Warum brauche ich das?","🤔", b.title?el("div",{class:"box-title"},b.title):null, htmlFrag(b.html));
    case "aha":  return box("aha","Aha-Moment","💡", b.title?el("div",{class:"box-title"},b.title):null, htmlFrag(b.html));
    case "warn": return box("warn",b.tag||"Achtung","⚠️", b.title?el("div",{class:"box-title"},b.title):null, htmlFrag(b.html));
    case "quote":{const q=el("div",{class:"box box-quote"}); q.appendChild(htmlFrag(b.html)); if(b.source)q.appendChild(el("span",{class:"qsource"},"— "+b.source)); return q;}
    case "formula": {

      f.appendChild(el("div",{html:"\\["+b.tex+"\\]"}));
      if(b.caption) f.appendChild(el("span",{class:"fcap",html:b.caption}));
      return f;
    }
    case "table": return renderTable(b);
    case "widget": return renderWidget(b);
    case "html": return htmlFrag(b.html);

}

function viewQuiz(L){
  cleanupView();
  if(!L.quiz||!L.quiz.length){return viewDashboard();}
  const v=el("div",{class:"view"});
  v.appendChild(el("div",{class:"crumb"},"Lektion "+L.id+" · "+L.title));
  v.appendChild(el("h1",{class:"title"},"Quiz – Lektion "+L.id));
  v.appendChild(el("p",{class:"subtitle"},"Teste dein Wissen. "+L.quiz.length+" Fragen · ab 80 % gilt als bestanden."));

  const card=el("div",{class:"quiz-card"});
  card.appendChild(el("div",{class:"quiz-head"},
    el("span",{class:"qh-ico"},"🧠"),el("h3",{},L.title),
    el("span",{class:"qmeta"},L.quiz.length+" Fragen")));
  const answered=new Array(L.quiz.length).fill(false);
  let correct=0;
  const foot=el("div",{class:"quiz-foot"});
  const scoreEl=el("span",{class:"quiz-score"},"0 / "+L.quiz.length);
  const bar=el("div",{class:"scorebar"},el("div",{class:"fill"}));
  function refresh(){
    const done=answered.filter(Boolean).length;
    scoreEl.textContent=correct+" / "+L.quiz.length+(done===L.quiz.length?"  ("+Math.round(correct/L.quiz.length*100)+" %)":"");
    bar.querySelector(".fill").style.width=(correct/L.quiz.length*100)+"%";
    if(done===L.quiz.length){ saveQuiz(L.id,correct,L.quiz.length);
      let msg = correct/L.quiz.length>=0.8? "🎉 Bestanden! Stark.": correct/L.quiz.length>=0.5? "Fast! Schau dir die markierten Fragen nochmal an.":"Nochmal üben lohnt sich – zurück ins Kapitel!";
      if(!foot.querySelector(".qdone")) foot.appendChild(el("span",{class:"qdone muted small"},msg));
    }
  }
  L.quiz.forEach((q,qi)=>{
    const qb=el("div",{class:"q-block"});
    qb.appendChild(el("div",{class:"q-num"},"FRAGE "+(qi+1)));
    qb.appendChild(el("div",{class:"q-text",html:q.q}));
    const opts=el("div",{class:"q-opts"});
    const expl=el("div",{class:"q-explain",html:"<b>Erklärung:</b> "+(q.explain||"")});
    q.options.forEach((o,oi)=>{
      const opt=el("div",{class:"opt"},el("span",{class:"mark"},String.fromCharCode(65+oi)),el("span",{html:o}));
      opt.addEventListener("click",()=>{
        if(answered[qi])return; answered[qi]=true;
        const right=oi===q.correct;
        if(right){correct++;opt.classList.add("correct");}
        else{opt.classList.add("wrong"); opts.children[q.correct].classList.add("correct");}
        [...opts.children].forEach(c=>c.classList.add("disabled"));
        expl.classList.add("show");
        refresh();
      });
      opts.appendChild(opt);
    });
    qb.appendChild(opts);qb.appendChild(expl);card.appendChild(qb);
  });
  foot.appendChild(scoreEl);foot.appendChild(bar);
  const retry=el("button",{class:"btn ghost"},"↻ Neu starten");
  retry.addEventListener("click",()=>route()); foot.appendChild(retry);
  card.appendChild(foot);
  v.appendChild(card);

  // nav to next lesson
  const NL=LESSONS.find(x=>x.id===L.id+1);
  const nav=el("div",{class:"sec-nav"});
  nav.appendChild(el("a",{class:"btn",href:"#/l/"+L.id+"/"+L.sections.length},"← zurück zur Lektion"));
  nav.appendChild(NL?el("a",{class:"btn primary",href:"#/l/"+NL.id+"/1"},"Lektion "+NL.id+" →"):el("a",{class:"btn primary",href:"#/"},"Zur Übersicht →"));

}

function ringEl(p,id){
  const r=14,c=2*Math.PI*r;
  const wrap=el("div",{class:"ring",id:id});
  wrap.innerHTML=`<svg width="30" height="30" viewBox="0 0 30 30">
    <circle class="bg" cx="15" cy="15" r="${r}" fill="none" stroke-width="3"></circle>
    <circle class="fg" cx="15" cy="15" r="${r}" fill="none" stroke-width="3" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${c*(1-p)}"></circle></svg>`;
  return wrap;
}
function updateProgressUI(){
  const op=overallProgress();
  $("#topProgFill").style.width=(op*100)+"%";
  $("#topProgPct").textContent=Math.round(op*100)+"%";
  LESSONS.forEach(L=>{
    const p=lessonProgress(L), ring=$("#ring-"+L.id+" .fg");
    if(ring){const c=2*Math.PI*14;ring.style.strokeDashoffset=c*(1-p);}
    L.sections.forEach(s=>{const it=$("#si-"+L.id+"-"+s.idx);if(it)it.classList.toggle("done",isDone(L.id+"-"+s.idx));});
    if(L.quiz&&L.quiz.length){const qi=$("#si-quiz-"+L.id);
      if(qi){qi.classList.toggle("done",quizPassed(L.id));
        qi.querySelector(".stit").textContent="Quiz"+(progress.quiz[L.id]?" ("+progress.quiz[L.id].score+"/"+progress.quiz[L.id].total+")":"");}}
  });
}
function setActiveNav(kind,L,sIdx){
  $$("#sidebar .section-item").forEach(e=>e.classList.remove("active"));
  $$(".nav-top a").forEach(e=>e.classList.remove("active"));
  $$(".lesson-group").forEach(g=>g.classList.remove("open"));
  if(kind==="section"){const it=$("#si-"+L.id+"-"+sIdx);if(it)it.classList.add("active");$("#lg-"+L.id)?.classList.add("open");}
  else if(kind==="quiz"){const it=$("#si-quiz-"+L.id);if(it)it.classList.add("active");$("#lg-"+L.id)?.classList.add("open");}
  else if(kind==="home"){$("#navHome").classList.add("active");}
  else if(kind==="formel"){$("#navFormel").classList.add("active");}
}
function closeMobile(){$("#sidebar").classList.remove("open");$("#scrim").classList.remove("show");}

/* ============================ ROUTER ============================ */
function route(){
  closeMobile(); // Mobile: Sidebar bei jedem Seitenwechsel schließen (auch via Start/Formeln/Dashboard-Karten)
  const h=location.hash||"#/";
  const m=h.match(/^#\/l\/(\d+)\/(\d+)/);
  if(m){const L=LESSONS.find(x=>x.id===+m[1]); if(L){viewSection(L,+m[2]);setActiveNav("section",L,+m[2]);return;}}
  const q=h.match(/^#\/quiz\/(\d+)/);
  if(q){const L=LESSONS.find(x=>x.id===+q[1]); if(L){viewQuiz(L);setActiveNav("quiz",L);return;}}
  if(h.startsWith("#/formelsammlung")){viewFormel();setActiveNav("formel");return;}
  viewDashboard();setActiveNav("home");
}

/* ============================ INIT ============================ */
function initApp(){
  buildSidebar();
  updateProgressUI();
  window.addEventListener("hashchange",route);
  $("#menuBtn").addEventListener("click",()=>{$("#sidebar").classList.toggle("open");$("#scrim").classList.toggle("show");});
  $("#scrim").addEventListener("click",closeMobile);
  route();
  setTimeout(()=>$("#loading").classList.add("hide"),250);
}
</script>

  /* ============================================================

      stepsBox.innerHTML = "";
      schritte.forEach(function (s, i) {
        var step = E("div", {

        stepsBox.appendChild(step);
      });
      detail.innerHTML = "<b>Worauf es ankommt:</b> " + schritte[pos].detail;

      btnRow.innerHTML = "";
      btnRow.appendChild(E("button", {
        class: "btn ghost", text: "◀ zurück",
        onclick: function () { if (pos > 0) { pos--; render(); } }
      }));
      if (pos < schritte.length - 1) {
        btnRow.appendChild(E("button", {
          class: "btn primary", text: "weiter ▶",

        }));
      } else {
        btnRow.appendChild(E("button", {
          class: "btn ghost", text: "↺ von vorn",
          onclick: function () { pos = 0; render(); }

  /* ============================================================
     WIDGET C2 (1.3) – "Studien-Design-Navigator"
     Design-Szenarien der Krankenhaus-Studie einordnen
     (Datenquelle / Zeitdesign / Analyse-Bereich).
     ============================================================ */
  function widgetDesign(el, ctx) {
    var E = ctx.el;

    /* ---------- Teil 1: Design einordnen ---------- */
    var teil1 = E("div");
    teil1.appendChild(E("div", { class: "sub", text: "Studien-Design einordnen", style: { fontWeight: "700", marginBottom: "8px" } }));

    var dimensionen = {
      quelle: { label: "Datenquelle", opts: [["primaer", "Primärdaten"], ["sekundaer", "Sekundärdaten"]] },
      zeit:   { label: "Zeitdesign", opts: [["quer", "Querschnitt"], ["panel", "Panel"], ["trend", "Trend"]] },
      analyse:{ label: "Analyse-Bereich", opts: [["deskr", "Deskriptiv"], ["infer", "Inferenz"], ["explo", "Explorativ"]] }
    };

    var szenarien = [
      { t: "Wir befragen selbst 50 Krankenhäuser per Fragebogen.", dim: "quelle", l: "primaer", w: "Selbst erhobene Daten → Primärdaten." },
      { t: "Wir verwenden die Belegungsdaten aus dem Vorjahr erneut.", dim: "quelle", l: "sekundaer", w: "Bereits vorhandene Daten → Sekundärdaten." },
      { t: "Einmalige Bestandsaufnahme der Intensivbetten in 3 Wochen.", dim: "zeit", l: "quer", w: "Nur ein kurzer Zeitraum (2–4 Wochen) → Querschnittsdesign." },
      { t: "Halbjährlich werden IMMER DIESELBEN Krankenhäuser befragt.", dim: "zeit", l: "panel", w: "Gleiche Merkmalsträger über die Zeit → Paneldesign (höchster Informationsgehalt)." },
      { t: "Jedes Jahr werden WECHSELNDE Krankenhäuser befragt.", dim: "zeit", l: "trend", w: "Regelmäßig, aber nicht dieselben Merkmalsträger → Trenddesign." },
      { t: "Wir berechnen die durchschnittliche Bettenbelegung und zeichnen ein Diagramm.", dim: "analyse", l: "deskr", w: "Daten komprimiert beschreiben → deskriptive Statistik." },
      { t: "Wir prüfen die Hypothese „Uni-Kliniken haben einen größeren Einzugsbereich“.", dim: "analyse", l: "infer", w: "Schluss von der Stichprobe auf die Grundgesamtheit per Hypothese → Inferenzstatistik." },
      { t: "Erste Analysen zu Beginn der Corona-Pandemie auf völlig neuem Gebiet.", dim: "analyse", l: "explo", w: "Erkundung eines unerforschten Bereichs → explorative Statistik." }
    ];

    var t1answered = {};
    var t1score = E("div", { class: "readout", style: { marginBottom: "10px" } });

    function renderT1Score() {
      var done = Object.keys(t1answered).length, right = 0;
      szenarien.forEach(function (s, i) { if (t1answered[i] === s.l) right++; });
      t1score.innerHTML = "";
      t1score.appendChild(E("div", { class: "stat teal" },
        E("div", { class: "v" }, String(done) + "/" + szenarien.length),
        E("div", { class: "l" }, "beantwortet")));
      t1score.appendChild(E("div", { class: "stat good" },
        E("div", { class: "v" }, String(right)),
        E("div", { class: "l" }, "richtig")));
    }

    szenarien.forEach(function (s, i) {
      var box = E("div", {
        style: { border: "1px solid rgba(255,255,255,.12)", borderRadius: "12px", padding: "10px 12px", marginBottom: "8px", background: "rgba(255,255,255,.02)" }
      });
      box.appendChild(E("div", { style: { fontWeight: "600", marginBottom: "6px" }, text: s.t }));
      box.appendChild(E("div", { style: { fontSize: ".8em", opacity: ".7", marginBottom: "6px" }, text: dimensionen[s.dim].label + ":" }));
      var chipRow = E("div", { class: "chips" });
      var fb = E("div", { style: { marginTop: "8px", fontSize: ".9em", display: "none" } });
      dimensionen[s.dim].opts.forEach(function (o) {
        var chip = E("button", { class: "chip", text: o[1] });
        chip.addEventListener("click", function () {
          t1answered[i] = o[0];
          Array.prototype.forEach.call(chipRow.children, function (c) { c.classList.remove("active"); });
          chip.classList.add("active");
          var ok = o[0] === s.l;
          fb.style.display = "block";
          fb.style.color = ok ? "var(--good, #6bd3a0)" : "var(--bad, #e8836b)";
          fb.innerHTML = (ok ? "✓ " : "✗ ") + s.w;
          renderT1Score();
        });
        chipRow.appendChild(chip);
      });
      box.appendChild(chipRow);
      box.appendChild(fb);
      teil1.appendChild(box);
    });

    renderT1Score();
    teil1.insertBefore(t1score, teil1.children[1]);

    el.appendChild(teil1);

    /* ---------- Teil 2: Urliste-Explorer (Ausblick auf Lektion 2) ----------
       Tabelle 1 (Pflegeroboter-Befragung, 25 Patient:innen) aus spec_lektion1.md.
       Live: n je Spalte (NA-Behandlung: 25/24/25/19), Distinct-Werte,
       automatisch erkanntes Skalenniveau, Häufigkeitstabelle. */
    var NA = null;
    var spalten = [
      {
        label: "Geschlecht", ordnung: null, dichotom: false,
        hinweis: "In dieser Stichprobe kommen nur zwei Ausprägungen vor (weiblich/männlich); das Merkmal hatte in der Befragung aber drei mögliche Ausprägungen (weiblich/männlich/divers) → nicht dichotom.",
        werte: ["weiblich", "weiblich", "weiblich", "weiblich", "männlich", "weiblich", "weiblich", "weiblich", "männlich", "männlich", "weiblich", "männlich", "weiblich", "weiblich", "weiblich", "weiblich", "weiblich", "weiblich", "männlich", "weiblich", "weiblich", "weiblich", "weiblich", "weiblich", "weiblich"]
      },
      {
        label: "Zufriedenheit", ordnung: ["sehr gut", "gut", "befriedigend", "ausreichend", "mangelhaft"],
        werte: ["gut", "gut", "gut", "gut", "befriedigend", "befriedigend", "befriedigend", "befriedigend", "gut", "befriedigend", "befriedigend", NA, "gut", "gut", "gut", "ausreichend", "gut", "gut", "sehr gut", "ausreichend", "gut", "befriedigend", "gut", "befriedigend", "befriedigend"]
      },
      {
        label: "bisheriger Kontakt", ordnung: null,
        werte: [1, 5, 0, 0, 1, 1, 2, 1, 1, 1, 1, 1, 2, 1, 0, 3, 1, 1, 0, 3, 0, 1, 1, 2, 1]
      },
      {
        label: "Alter", ordnung: null,
        werte: [16, NA, 50, 35, NA, 47, 15, 20, 47, 48, 44, NA, 55, 56, 35, 48, NA, 52, 49, NA, 68, 17, 26, 39, NA]
      }
    ];

    function analysiere(sp) {
      var gueltig = sp.werte.filter(function (v) { return v !== NA; });
      var n = gueltig.length;
      var fehlend = sp.werte.length - n;
      var numerisch = gueltig.every(function (v) { return typeof v === "number"; });
      var counts = {};
      gueltig.forEach(function (v) { var k = String(v); counts[k] = (counts[k] || 0) + 1; });
      var distinct = Object.keys(counts);
      if (sp.ordnung) {
        distinct.sort(function (a, b) { return sp.ordnung.indexOf(a) - sp.ordnung.indexOf(b); });
      } else if (numerisch) {
        distinct.sort(function (a, b) { return Number(a) - Number(b); });
      }
      var skala, zusatz, grund;
      if (!numerisch) {
        if (sp.ordnung) {
          skala = "ordinal"; zusatz = "";
          grund = "Kategorien MIT sinnvoller Reihenfolge („" + sp.ordnung[0] + "“ … „" + sp.ordnung[sp.ordnung.length - 1] + "“), aber die Abstände sind nicht interpretierbar → ordinal.";
        } else {
          // Dichotomie ist eine Eigenschaft des MERKMALS (zwei mögliche Ausprägungen),
          // nicht der Stichprobe — daher per Flag, nicht aus distinct.length geschlossen.
          skala = "nominal"; zusatz = sp.dichotom ? "dichotom" : "";
          if (sp.dichotom) {
            grund = "Kategorien ohne sinnvolle Reihenfolge → nominal; das Merkmal hat genau zwei mögliche Ausprägungen → dichotom.";
          } else {
            grund = "Kategorien ohne sinnvolle Reihenfolge → nominal." + (sp.hinweis ? " " + sp.hinweis : "");
          }
        }
      } else {
        skala = "kardinal";
        if (distinct.length <= 10) {
          zusatz = "diskret";
          grund = "Zahlen mit interpretierbaren Abständen → kardinal; nur " + ctx.fmt.int(distinct.length) + " verschiedene Werte → wie ein diskretes Merkmal behandeln.";
        } else {
          zusatz = "wie stetig";
          grund = "Zahlen mit interpretierbaren Abständen → kardinal; " + ctx.fmt.int(distinct.length) + " verschiedene Werte bei " + ctx.fmt.int(n) + " Angaben → wie ein stetiges Merkmal behandeln (in Lektion 2: Klassen bilden).";
        }
      }
      return { n: n, fehlend: fehlend, counts: counts, distinct: distinct, numerisch: numerisch, skala: skala, zusatz: zusatz, grund: grund };
    }

    var teil2 = E("div");
    teil2.appendChild(E("div", { class: "sub", text: "Teil 2 · Urliste-Explorer (Ausblick auf Lektion 2)", style: { fontWeight: "700", marginBottom: "4px" } }));
    teil2.appendChild(E("div", {
      style: { fontSize: ".9em", opacity: ".8", marginBottom: "10px" },
      html: "Tabelle 1 aus dem Skript: <b>25 Patient:innen</b> wurden zu Pflegerobotern befragt. Wähle eine Spalte – das Widget zeigt live den Stichprobenumfang \\(n\\) (fehlende Angaben zählen nicht mit!), die Anzahl verschiedener Ausprägungen, das automatisch erkannte Skalenniveau und die Häufigkeitstabelle. Ausgewertet wird der Datensatz erst in Lektion 2."
    }));

    var colRow = E("div", { class: "chips", style: { marginBottom: "10px" } });
    var t2read = E("div", { class: "readout", style: { marginBottom: "10px" } });
    var t2grund = E("div", { class: "widget-hint", style: { marginBottom: "12px" } });
    var freqWrap = E("div", { style: { marginBottom: "14px" } });
    var tabWrap = E("div");
    var selected = 0;

    function renderTabelle1() {
      tabWrap.innerHTML = "";
      var tw = E("div", { class: "tbl-wrap" });
      var tbl = E("table", { class: "data" });
      var thead = E("thead");
      var hr = E("tr");
      hr.appendChild(E("th", { text: "Patient:in" }));
      spalten.forEach(function (sp, si) {
        hr.appendChild(E("th", { text: sp.label, style: si === selected ? { color: "var(--teal, #5fd0c5)" } : {} }));
      });
      thead.appendChild(hr);
      tbl.appendChild(thead);
      var tbody = E("tbody");
      spalten[0].werte.forEach(function (_, p) {
        var tr = E("tr");
        tr.appendChild(E("td", { text: ctx.fmt.int(p + 1) }));
        spalten.forEach(function (sp, si) {
          var v = sp.werte[p];
          var txt = v === NA ? "–" : (typeof v === "number" ? ctx.fmt.int(v) : String(v));
          tr.appendChild(E("td", {
            text: txt,
            style: {
              background: si === selected ? "rgba(95,208,197,.10)" : "transparent",
              opacity: v === NA ? ".45" : "1"
            }
          }));
        });
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      tw.appendChild(tbl);
      tabWrap.appendChild(tw);
      tabWrap.appendChild(E("div", {
        style: { fontSize: ".78em", opacity: ".6", marginTop: "4px" },
        html: "Tabelle 1: Ergebnisse der Patientenbefragung („–“ = fehlende Angabe). Quelle: Heike Bornewasser-Hermes, 2022."
      }));
    }

    function renderExplorer() {
      var sp = spalten[selected];
      var a = analysiere(sp);

      Array.prototype.forEach.call(colRow.children, function (c, i) {
        c.classList.toggle("active", i === selected);
      });

      t2read.innerHTML = "";
      t2read.appendChild(E("div", { class: "stat teal" },
        E("div", { class: "v" }, ctx.fmt.int(a.n)),
        E("div", { class: "l" }, "n (gültige Werte)")));
      t2read.appendChild(E("div", { class: "stat" },
        E("div", { class: "v" }, ctx.fmt.int(a.fehlend)),
        E("div", { class: "l" }, "fehlend (NA)")));
      t2read.appendChild(E("div", { class: "stat violet" },
        E("div", { class: "v" }, ctx.fmt.int(a.distinct.length)),
        E("div", { class: "l" }, "verschiedene Ausprägungen")));
      t2read.appendChild(E("div", { class: "stat blue" },
        E("div", { class: "v" }, a.skala),
        E("div", { class: "l" }, "Skalenniveau" + (a.zusatz ? " · " + a.zusatz : ""))));

      t2grund.innerHTML = "<b>Warum?</b> " + a.grund +
        " Von 25 Befragten liegen " + ctx.fmt.int(a.n) + " Antworten vor → Urliste \\(x_1, \\dots, x_{" + a.n + "}\\), also \\(n = " + a.n + "\\).";

      freqWrap.innerHTML = "";
      freqWrap.appendChild(E("div", { style: { fontWeight: "600", fontSize: ".92em", marginBottom: "6px" }, text: "Häufigkeitstabelle „" + sp.label + "“ (Ausblick auf Lektion 2)" }));
      var tw = E("div", { class: "tbl-wrap" });
      var tbl = E("table", { class: "data" });
      var thead = E("thead");
      var hr = E("tr");
      hr.appendChild(E("th", { text: "Ausprägung" }));
      hr.appendChild(E("th", { text: "absolute Häufigkeit" }));
      thead.appendChild(hr);
      tbl.appendChild(thead);
      var tbody = E("tbody");
      a.distinct.forEach(function (k) {
        var tr = E("tr");
        tr.appendChild(E("td", { text: a.numerisch ? ctx.fmt.int(Number(k)) : k }));
        tr.appendChild(E("td", { text: ctx.fmt.int(a.counts[k]) + "×" }));
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      tw.appendChild(tbl);
      freqWrap.appendChild(tw);

      renderTabelle1();
      ctx.typeset();
    }

    spalten.forEach(function (sp, i) {
      var chip = E("button", { class: "chip" + (i === 0 ? " active" : ""), text: sp.label });
      chip.addEventListener("click", function () { selected = i; renderExplorer(); });
      colRow.appendChild(chip);
    });

    teil2.appendChild(colRow);
    teil2.appendChild(t2read);
    teil2.appendChild(t2grund);
    teil2.appendChild(freqWrap);
    teil2.appendChild(tabWrap);

    el.appendChild(E("div", { style: { borderTop: "1px solid rgba(255,255,255,.12)", margin: "18px 0" } }));
    el.appendChild(teil2);
    renderExplorer();
  }

          { t: "p", lead: true, html: "Die Krankenhaus-Studie soll z. B. klären: Liegt das Krankenhaus städtisch oder ländlich? Ist es ein Universitätsklinikum (ja/nein)? Wie groß ist das Einzugsgebiet in Kilometern? Welche Stationen gibt es? Wie viele Intensiv- und Normalbetten sind belegt? Und wie zufrieden sind die Patient:innen? An diesen Fragen lassen sich alle Grundbegriffe sauber erklären." },

          { t: "h", text: "Wer wird untersucht? Merkmalsträger, Grundgesamtheit, Stichprobe", icon: "🏥" },
          { t: "def", term: "Merkmalsträger", html: "Eine interessierende Person oder ein Objekt, über die/das man Aussagen gewinnen möchte. Im Beispiel: <b>jedes einzelne deutsche Krankenhaus</b>. Merkmalsträger können auch Einzelpersonen, Unternehmen oder Gegenstände sein." },
          { t: "def", term: "Grundgesamtheit", html: "Die Grundgesamtheit umfasst <b>alle</b> Merkmalsträger, die für die Studie in Frage kommen. Im Beispiel: alle deutschen Krankenhäuser." },
          { t: "def", term: "Stichprobe", html: "Die Stichprobe umfasst alle <b>tatsächlich untersuchten</b> Merkmalsträger. Sie sollte <b>repräsentativ</b> sein. Faustregel: Je größer die Stichprobe, desto präziser die Aussagen – aber eine große, nicht repräsentative Stichprobe nützt nichts." },

          { t: "quote", html: "„Bei der Zusammensetzung der Stichprobe ist es von besonderer Bedeutung, dass die Merkmalsträger repräsentativ für die Grundgesamtheit sind …“", source: "Bornewasser-Hermes, 2022" },

          { t: "sub", html: "Wie zieht man eine Stichprobe? Vier Arten" },
          {
            t: "list", items: [
              "<b>Einfache Zufallsstichprobe:</b> Jeder Merkmalsträger hat die <i>gleiche</i> Auswahlwahrscheinlichkeit. Beste Grundlage – setzt aber voraus, dass die Grundgesamtheit vollständig bekannt ist.",
              "<b>Geschichtete Stichprobe:</b> Die Grundgesamtheit wird erst in Teilpopulationen (Schichten) aufgeteilt, dann wird aus jeder Schicht zufällig gezogen. Beispiel: Schichten <i>bis 500</i> / <i>mehr als 500 bis 1000</i> / <i>ab 1000</i> Patient:innen.",
              "<b>Klumpenstichprobe:</b> Natürlich existierende Teilmengen (Klumpen) werden zufällig ausgewählt und dann <i>vollständig</i> untersucht. Beispiel: Aus den <b>294</b> deutschen Landkreisen werden einige zufällig gewählt; dort werden ALLE Krankenhäuser untersucht.",
              "<b>Ad-hoc-Stichprobe:</b> Man nimmt, was gerade verfügbar ist (z. B. Straßenumfrage). „Keine gute Grundlage, um allgemeingültige Aussagen treffen zu können.“"
            ]
          },
          { t: "quote", html: "„Nur Zufallsstichproben bilden eine geeignete Basis für statistische Analysen, mithilfe derer man Rückschlüsse auf die Allgemeinheit ziehen möchte.“", source: "Bornewasser-Hermes, 2022" },

          { t: "h", text: "Was wird gemessen? Merkmal & Merkmalsausprägung", icon: "📋" },
          { t: "def", term: "Merkmal", html: "Eine interessierende Eigenschaft eines Merkmalsträgers (auch „Variable“ genannt). Beispiel: „Geschlecht“, „Zufriedenheit“, „Alter“." },
          { t: "def", term: "Merkmalsausprägung", html: "Eine mögliche Beobachtung eines Merkmals – also ein konkreter Wert, den das Merkmal annehmen kann. Beim Merkmal „Geschlecht“ sind das z. B. „weiblich“ oder „männlich“." },
          { t: "aha", title: "Merkmal vs. Ausprägung – der Schubladen-Trick", html: "Das <b>Merkmal</b> ist die Schublade („Geschlecht“), die <b>Merkmalsausprägung</b> ist das, was drin liegt („weiblich“). Frage zur Sicherheit immer: „Wovon ist das ein konkreter Wert?“ – „weiblich“ ist ein Wert von „Geschlecht“, also Ausprägung." },

          { t: "h", text: "Auf welcher Skala? Die Skalenniveaus", icon: "📏" },
          { t: "def", term: "Skalenniveau", html: "Das Skalenniveau <b>entscheidet über die möglichen statistischen Analysen</b>. Man unterscheidet drei Niveaus: Nominal-, Ordinal- und Kardinalskala (= metrische Skala)." },
          { t: "def", term: "Nominalskala", html: "Erlaubt am <b>wenigsten</b> Auswertungen. Die Ausprägungen sind Namen/Kategorien <b>ohne</b> sinnvolle Reihenfolge (z. B. Stationen: Onkologie, Chirurgie, Orthopädie). Spezialfall <b>dichotom</b>: genau zwei Ausprägungen (städtisch/ländlich, Uni-Klinik ja/nein)." },
          { t: "def", term: "Ordinalskala", html: "Erlaubt <b>mehr</b> als die Nominal-, aber <b>weniger</b> als die Kardinalskala. Kategorien mit <b>sinnvoller Reihenfolge</b>, aber die <b>Abstände</b> sind nicht mathematisch interpretierbar. Beispiel: Patientenzufriedenheit (sehr gut → gut → mittelmäßig → schlecht → sehr schlecht)." },
          { t: "def", term: "Kardinalskala (metrisch)", html: "Erlaubt die <b>meisten</b> Auswertungen. Die Ausprägungen sind Zahlen <b>und</b> die Abstände sind mathematisch sinnvoll interpretierbar. Beispiel: Anzahl freier Intensivbetten." },
          { t: "def", term: "Intervall- vs. Verhältnisskala", html: "Innerhalb der Kardinalskala: Die <b>Intervallskala</b> hat <b>keinen</b> natürlichen Nullpunkt (z. B. Temperatur in °C), die <b>Verhältnisskala</b> hat einen <b>natürlichen Nullpunkt</b> (z. B. Geldbetrag: 0 € = kein Geld, in jeder Währung)." },
          { t: "def", term: "Diskret vs. stetig", html: "Ein <b>diskretes</b> Merkmal hat nur wenige (endlich oder abzählbar unendlich viele) Ausprägungen (z. B. Anzahl Betten). Ein <b>stetiges</b> Merkmal kann alle Werte eines Intervalls annehmen, also sehr viele verschiedene (z. B. Geldbeträge auf den Cent)." },

          { t: "sub", html: "Abbildung 1 – Variablenklassifizierung nach Skalenniveaus" },
          {
            t: "html", html:
              "<div style=\"border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:16px;background:rgba(255,255,255,.02);line-height:1.7\">" +
              "<div style=\"font-weight:700;color:var(--teal,#5fd0c5);margin-bottom:6px\">Qualitative Merkmale</div>" +
              "<div style=\"padding-left:18px\">├── Nominalskala</div>" +
              "<div style=\"padding-left:18px\">└── Ordinalskala</div>" +
              "<div style=\"font-weight:700;color:var(--violet,#b79be8);margin:12px 0 6px\">Quantitative Merkmale</div>" +
              "<div style=\"padding-left:18px\">└── Kardinalskala</div>" +
              "<div style=\"padding-left:48px\">├── nach Anzahl Ausprägungen → <b>diskret</b> / <b>stetig</b></div>" +
              "<div style=\"padding-left:48px\">└── nach Nullpunkt → <b>Intervallskala</b> / <b>Verhältnisskala</b></div>" +
              "<div style=\"opacity:.6;font-size:.82em;margin-top:10px\">Quelle: Heike Bornewasser-Hermes, 2022.</div>" +
              "</div>"
          },
          { t: "p", html: "Merksatz für die Oberbegriffe: Nominal + Ordinal = <b>qualitative</b> Merkmale; Kardinal = <b>quantitative</b> Merkmale." },

          { t: "sub", html: "Die Krankenhaus-Merkmale auf einen Blick" },
          {

            headers: ["Merkmal", "Ausprägungen", "Skalenniveau"],
            rows: [

          { t: "warn", title: "Klassiker-Falle: Zahl ≠ metrisch", tag: "Klausur", html: "Eine Ausprägung in Zahlenform bedeutet <b>nicht automatisch</b> kardinal/metrisch! <b>Postleitzahl</b>, <b>Schulnote</b> und <b>Trikotnummer</b> sind Zahlen, aber nominal bzw. ordinal. Das ist der häufigste Klausurfehler zu dieser Lektion." },

          { t: "aha", title: "Die Skalen-Treppe (und drei Fallen)", html: "<b>Nominal &lt; Ordinal &lt; Kardinal</b> – je höher die Treppe, desto mehr darf man rechnen: nominal nur zählen, ordinal zusätzlich sortieren (Rang), kardinal zusätzlich addieren und Abstände/Durchschnitte bilden.<br><br>" +
            "• <b>Postleitzahl-Falle:</b> 50667 (Köln) ist nicht „mehr“ als 10115 (Berlin) → nominal.<br>" +
            "• <b>Schulnoten-Falle:</b> Der „Notendurchschnitt 2,3“ ist streng genommen ein beliebter Regelbruch – Noten sind ordinal, die Abstände nicht gleich.<br>" +
            "• <b>Temperatur-Trick:</b> 20 °C ist NICHT „doppelt so warm“ wie 10 °C (kein natürlicher Nullpunkt → intervall), aber 20 € sind doppelt so viel wie 10 € (natürlicher Nullpunkt → verhältnis)." },

          { t: "quote", html: "„So könnte man bspw. nicht anbringen, dass eine ‚sehr gute‘ Beurteilung eines Krankenhauses doppelt so gut wie eine ‚gute‘ Bewertung ist.“", source: "Bornewasser-Hermes, 2022 (zur Ordinalskala)" },

          { t: "why", title: "Warum brauche ich das?", html: "Das Skalenniveau ist der <b>Türsteher</b> für jede Berechnung: Es entscheidet, ob du den Mittelwert (kardinal), den Median/eine Rangfolge (ab ordinal) oder nur den Modus und Häufigkeiten (nominal) bilden darfst. Wer die Skala falsch einschätzt, produziert Unsinn wie eine „durchschnittliche Postleitzahl von 41 234“." },

      /* ================= 1.3 ================= */
      {
        num: "1.3",
        title: "Ablauf statistischer Untersuchungen",
        intro: "Statistisches Arbeiten ist Kochen: einkaufen, putzen, kochen. Der unterschätzte Schritt ist das Putzen.",
        blocks: [
          { t: "p", lead: true, html: "Wir bleiben bei unserer Studie über die <b>deutschen Krankenhäuser</b>. Eine statistische Untersuchung läuft immer in drei Schritten ab: erst <b>Datensammlung</b>, dann <b>Datenaufbereitung</b>, schließlich <b>Datenanalyse</b>. Klingt simpel – aber jeder Schritt hat seine Fallstricke." },
          {
            t: "list", ordered: true, items: [
              "<b>Datensammlung:</b> Wo kommen die Daten her und über welchen Zeitraum?",
              "<b>Datenaufbereitung:</b> Daten mit Statistiksoftware sauber machen – auf fehlende und fehlerhaft übertragene Werte prüfen.",
              "<b>Datenanalyse:</b> Auswerten – deskriptiv, inferenziell oder explorativ."
            ]
          },

          { t: "h", text: "Schritt 1 – Datensammlung", icon: "🛒" },
          { t: "p", html: "Bei der <b>Herkunft</b> unterscheidet man <b>Primärdaten</b> (selbst erhoben – Befragung, Beobachtung, Experiment) und <b>Sekundärdaten</b> (Rückgriff auf bereits vorhandene Daten, z. B. aus dem Vorjahr)." },
          { t: "p", html: "Bei der <b>zeitlichen Dimension</b> wird es spannend:" },
          { t: "def", term: "Querschnittsdesign", html: "Die Erhebung findet nur zu einem Zeitpunkt bzw. in einer kurzen Zeitspanne statt (ca. 2 bis 4 Wochen). Eine Momentaufnahme." },
          { t: "def", term: "Längsschnittdesign", html: "Erfasst immer wieder die gleichen Daten zu mehreren aufeinanderfolgenden Zeitpunkten. Zwei Unterarten: <b>Trenddesign</b> (regelmäßig, aber nicht notwendig dieselben Merkmalsträger) und <b>Paneldesign</b> (regelmäßig und <b>immer dieselben</b> Merkmalsträger)." },
          { t: "def", term: "Paneldesign", html: "Bringt die Ergebnisse mit den meisten Informationen hervor: Weil immer dieselben Merkmalsträger befragt werden, sind <b>intraindividuelle Veränderungen</b> über die Zeit sichtbar. Nachteile: <b>Paneleffekte/Lerneffekte</b> (Befragte ändern sich durchs Befragtwerden) und <b>Panelmortalität</b> (Teilnehmende fallen über die Zeit weg)." },
          { t: "p", html: "Informationsgehalt-Rangfolge laut Skript: <b>Panel &gt; Trend &gt; Querschnitt</b>." },
          { t: "quote", html: "„Dennoch liefern Studien im Paneldesign den höchsten Informationsgehalt, gefolgt vom Trenddesign und abschließend vom Querschnittsdesign.“", source: "Bornewasser-Hermes, 2022" },

          { t: "h", text: "Schritt 2 – Datenaufbereitung", icon: "🧹" },
          { t: "p", html: "Die Rohdaten werden mit Statistiksoftware wie <b>Excel, SPSS, R oder Stata</b> aufbereitet und auf <b>fehlende</b> sowie <b>fehlerhaft übertragene</b> Daten geprüft. Der langweiligste, aber entscheidende Schritt – die Grundlage für eine saubere Auswertung." },

          { t: "h", text: "Schritt 3 – Datenanalyse", icon: "🔬" },
          { t: "def", term: "Deskriptive Statistik", html: "Beschreibt die gesammelten Daten mit Tabellen, Grafiken und Maßzahlen (z. B. dem Mittelwert). Ziel: die Daten <b>komprimiert zusammenfassen</b>." },
          { t: "def", term: "Inferenzstatistik", html: "Prüft, ob sich die deskriptiven Ergebnisse der Stichprobe auf die <b>Grundgesamtheit verallgemeinern</b> lassen. Arbeitet mit <b>Hypothesen</b>, z. B.: „Universitätskrankenhäuser haben einen größeren Einzugsbereich als Nicht-Universitätskrankenhäuser.“" },
          { t: "def", term: "Explorative Statistik", html: "Erkundet neue, noch wenig erforschte Bereiche. Beispiel: Zu Beginn der Corona-Pandemie waren sämtliche Analysen zunächst explorativer Natur." },

          { t: "aha", title: "Aha: Statistik ist Kochen", html: "<b>Datensammlung = einkaufen</b>, <b>Datenaufbereitung = Zutaten putzen und schneiden</b> (langweilig, aber ohne saubere Zutaten wird das Essen schlecht), <b>Datenanalyse = kochen und servieren</b>. Der unterschätzte Schritt ist das Putzen: „Garbage in, garbage out.“<br><br>Und der Unterschied Panel vs. Trend ist wie ein <b>Klassenfoto</b>: Trend = jedes Jahr irgendeine Schulklasse fotografieren; Panel = jedes Jahr <b>dieselbe</b> Klasse fotografieren – nur beim Panel sieht man, wie ein einzelnes Kind wächst." },

          { t: "why", title: "Warum brauche ich das?", html: "Bevor man rechnet, muss man wissen, <b>wie</b> die Daten entstanden sind. Eine geniale Analyse auf einer Ad-hoc-Straßenumfrage bleibt wertlos. Das Untersuchungsdesign entscheidet, welche Schlüsse überhaupt erlaubt sind – Veränderung über Zeit z. B. nur mit Längsschnitt/Panel." },

          { t: "quote", html: "„Die Statistik umfasst die statistische Analyse von Daten mit dem Ziel, neue Erkenntnisse zu gewinnen. … In der Regel untersucht man nur Daten einer Stichprobe.“", source: "Bornewasser-Hermes, 2022 (Zusammenfassung)" },

          {
            t: "widget", title: "Ablauf einer statistischen Untersuchung", icon: "🧭",
            hint: "Klick dich Schritt für Schritt durch die drei Phasen der Krankenhaus-Studie: Datensammlung → Datenaufbereitung → Datenanalyse.",
            render: widgetAblauf
          },

          { t: "divider" },

          { t: "h", text: "Ausblick: Die Urliste – die erste Notation der Statistik", icon: "🔢" },
          { t: "p", html: "Am Ende der Datensammlung steht für jedes Merkmal erst einmal eine schlichte, unsortierte Liste aller erhobenen Werte. Diese Liste hat einen eigenen Namen – und eine eigene Schreibweise, die dich ab Lektion 2 ständig begleitet. <i>(Das Skript führt die Urliste formal erst zu Beginn von Lektion 2 ein – hier kommt sie als ausdrücklich gekennzeichneter Vorgriff, damit die Notation beim ersten Rechnen schon sitzt.)</i>" },
          { t: "def", term: "Urliste / Rohdaten", html: "Die Urliste bzw. Rohdaten beinhalten die <b>gesammelten Daten eines Merkmals</b> – unsortiert, in der Reihenfolge der Erhebung. Sie ist der Ausgangspunkt jeder Datenanalyse und liegt für <b>jedes beliebige Skalenniveau</b> vor." },
          { t: "formula", tex: "x_1, x_2, \\dots, x_n", caption: "Die Urliste eines Merkmals. Kurzschreibweise: \\(x_i\\) für \\(i = 1, \\dots, n\\)." },
          { t: "p", html: "Dabei ist \\(x_1\\) die Merkmalsausprägung der ersten Person, \\(x_2\\) die der zweiten und \\(x_n\\) die der letzten. \\(n\\) steht für die Gesamtanzahl an Personen, den <b>Stichprobenumfang</b>. Der <b>Personenindex</b> \\(i = 1, \\dots, n\\) durchläuft einmal alle Merkmalsträger." },
          { t: "example", title: "Vier Urlisten, vier verschiedene n (Pflegeroboter-Befragung, Tabelle 1)", html: "In Lektion 2 startet ein konkreter Datensatz: <b>25 Patient:innen</b> wurden zu Pflegerobotern befragt. Jede der vier Merkmalsspalten ist eine eigene Urliste – mit eigenem \\(n\\):<br>• <b>Geschlecht:</b> alle 25 haben geantwortet → \\(n = 25\\)<br>• <b>Zufriedenheit:</b> eine Person hat die Bewertung ausgelassen → \\(n = 24\\)<br>• <b>Bisheriger Kontakt:</b> wieder alle → \\(n = 25\\)<br>• <b>Alter:</b> nur 19 wollten es verraten → \\(n = 19\\)" },
          { t: "aha", title: "Aha: n zählt Antworten, nicht Fragebögen", html: "Obwohl 25 Fragebögen eingesammelt wurden, ist \\(n\\) <b>pro Merkmal</b> verschieden: Jede fehlende Angabe (NA) drückt das \\(n\\) genau dieser Spalte – deshalb 25 / 24 / 25 / 19. Und genau das ist ein Ergebnis von <b>Schritt 2 (Datenaufbereitung)</b>: fehlende Werte erst einmal finden, bevor man rechnet." },

          {
            t: "widget", title: "Studien-Design-Navigator & Urliste-Explorer", icon: "🗂️",
            hint: "Teil 1: Ordne jedes Szenario der Krankenhaus-Studie dem richtigen Design zu (Datenquelle, Zeitdesign, Analyse-Bereich). Teil 2 (Ausblick auf Lektion 2): Erkunde Tabelle 1 – wähle eine Spalte und sieh live n, Ausprägungen, Skalenniveau und Häufigkeitstabelle.",

          { t: "aha", title: "Ausblick: gleich kommen echte Zahlen", html: "Lektion 1 bleibt bewusst <b>begrifflich</b> – gerechnet wird hier noch nichts. Den Datensatz der 25 Patient:innen (Geschlecht, Zufriedenheit, bisheriger Kontakt, Alter) hast du im Urliste-Explorer schon beschnuppert; <b>ausführlich ausgewertet</b> (Häufigkeiten, Grafiken, Mittelwerte) wird er erst <b>in Lektion 2</b>. Dort beginnt jede Analyse mit genau so einer <b>Urliste</b> \\(x_1, x_2, \\dots, x_n\\)." }
        ]

            "<tr><td>3</td><td>(45;50]</td><td>6</td><td>6/19 ≈ 0,316</td><td>0,789</td><td>5</td><td>≈ 0,063</td></tr>"+
            "<tr><td>4</td><td>(50;70]</td><td>4</td><td>4/19 ≈ 0,211</td><td>1</td><td>20</td><td>≈ 0,011</td></tr>"+
            "<tr><td>Σ</td><td></td><td>19</td><td>1</td><td></td><td></td><td></td></tr></tbody></table>"+
            "Klasse 2 „älter als 30, höchstens 45“ enthält 35, 44, 35, 39 → \\(n_2=4\\)."},

          {t:"aha", title:"Höhe lügt, Fläche sagt die Wahrheit", html:"Beim Balkendiagramm zählt die <b>Höhe</b>, beim Histogramm die <b>Fläche</b>. Die schmale Klasse \\((45;50]\\) ist nur 5 Jahre breit, hat aber die meisten Personen (6). Würde man nur die Höhe (rel. Häufigkeit) zeichnen, sähe sie unwichtig aus. Über die <b>Dichte</b> (0,063 – mit Abstand die höchste) wird sie korrekt zur Spitze. Wie auf einer Landkarte: ein winziges, dicht besiedeltes Bundesland kann mehr Einwohner haben als ein riesiges, leeres."},

          {t:"quote", html:"Die Fläche eines jeden Rechtecks zeichnet sich dadurch aus, dass sie die relative Häufigkeit der entsprechenden Klasse widerspiegelt. Damit muss die gesamte Fläche unter dem Histogramm 1 sein.", source:"BSTA01-02, S.42"},

          {t:"p", html:"Kontrolle: Klasse 3 hat Breite 5 · Dichte 0,063 ≈ 0,316 ≈ 6/19. Summiert man alle Rechteckflächen, kommt 1 heraus. <b>Das</b> ist der Sinn der Dichte."},

          {t:"why", title:"Warum brauche ich das?", html:"Rohdaten (25 Zeilen) sind unlesbar. Eine Häufigkeitstabelle plus Diagramm zeigt in zwei Sekunden, was 25 Befragte in Summe gesagt haben – die Basis jeder Auswertung, vom Krankenhaus-Report über die Marktanalyse bis zur Wahlprognose. Ohne diesen ersten Schritt rechnet man nie weiter."},
